version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR....
      - aws --version
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 846869029012.dkr.ecr.us-east-1.amazonaws.com
      - IMAGE_TAG=build-$(echo $CODEBUILD_BUILD_ID | awk -F":" '{print $2}')

  build:
    commands:
      - echo Build started on `date`
      - echo building the Jar file
      - mvn clean install
      - echo Building the Docker image...
      - docker build -t $REPOSITORY_URL:latest .
      - docker tag $REPOSITORY_URL:latest $REPOSITORY_URL:$IMAGE_TAG

  post_build:
    commands:
      - echo Build completed on `date`
      - echo pushing to repo
      - docker push $REPOSITORY_URL:latest
      - docker push $REPOSITORY_URL:$IMAGE_TAG

      # --- Registrar nueva Task Definition con la imagen recien pusheada ---
      - echo Descargando la Task Definition activa de $TASK_FAMILY...
      - aws ecs describe-task-definition --task-definition $TASK_FAMILY --query 'taskDefinition' --output json > current-taskdef.json
      - |
        jq --arg IMAGE "$REPOSITORY_URL:$IMAGE_TAG" \
          'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) |
           .containerDefinitions[0].image = $IMAGE' current-taskdef.json > taskdef.json
      - echo Nueva Task Definition a registrar-
      - cat taskdef.json
      - NEW_TASKDEF_ARN=$(aws ecs register-task-definition --cli-input-json file://taskdef.json --query 'taskDefinition.taskDefinitionArn' --output text)
      - echo Task Definition registrada -> $NEW_TASKDEF_ARN

      # --- Generar el appspec que le dice a CodeDeploy que Task Definition usar ---
      - |
        jq -n \
          --arg taskdef "$NEW_TASKDEF_ARN" \
          --arg container "$CONTAINER_NAME" \
          --argjson port "$CONTAINER_PORT" \
          '{
            version: "0.0",
            Resources: [
              {
                TargetService: {
                  Type: "AWS::ECS::Service",
                  Properties: {
                    TaskDefinition: $taskdef,
                    LoadBalancerInfo: {
                      ContainerName: $container,
                      ContainerPort: $port
                    }
                  }
                }
              }
            ]
          }' > appspec.json
      - echo appspec.json generado-
      - cat appspec.json

      # --- Disparar el deployment blue/green ---
      # AppSpecContent.content es un STRING que contiene el JSON del appspec
      # (no el JSON embebido directo), por eso el "tostring" al armar el
      # payload de create-deployment.
      - |
        jq -n \
          --arg app "$CODEDEPLOY_APP" \
          --arg group "$CODEDEPLOY_GROUP" \
          --slurpfile appspec appspec.json \
          '{
            applicationName: $app,
            deploymentGroupName: $group,
            revision: {
              revisionType: "AppSpecContent",
              appSpecContent: {
                content: ($appspec[0] | tostring)
              }
            }
          }' > deployment-input.json
      - echo deployment-input.json generado-
      - cat deployment-input.json
      - echo Disparando deployment blue/green en CodeDeploy...
      - DEPLOYMENT_ID=$(aws deploy create-deployment --cli-input-json file://deployment-input.json --query 'deploymentId' --output text)
      - echo Deployment creado -> $DEPLOYMENT_ID
      - echo "Sigue el progreso con- aws deploy get-deployment --deployment-id $DEPLOYMENT_ID"

      - echo Writing image definitions file...
      - printf '[{"name":"%s","imageUri":"%s"}]' $CONTAINER_NAME $REPOSITORY_URL:$IMAGE_TAG > imagedefinitions.json
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
    - appspec.json
    - taskdef.json
    - target/springboot-aws-deploy.jar